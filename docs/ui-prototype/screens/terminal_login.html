<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>POS Terminal Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "brand-dark": "#090D1A",
                        "brand-gray": "#1E293B",
                        "emerald-neon": "#10B981"
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #05070C;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(16, 185, 129, 0.03) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.03) 0%, transparent 45%);
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
        }

        .cyber-grid {
            background-size: 24px 24px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
        }

        .premium-input {
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .premium-input:focus {
            box-shadow: 0 0 0 2.5px rgba(16, 185, 129, 0.15);
            border-color: #10B981;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 md:p-6">
    <!-- Main Card Container (Fixed height for perfect visual balance) -->
    <div class="w-full max-w-4xl bg-white rounded-[24px] shadow-[0_20px_50px_rgba(0,0,0,0.3)] border border-slate-100/80 overflow-hidden flex flex-col md:flex-row h-auto md:h-[580px] animate-in fade-in duration-300">
        
        <!-- Left Side: System Telemetry & Branding -->
        <div class="w-full md:w-[42%] bg-brand-dark p-8 md:p-10 flex flex-col justify-center items-center text-white relative overflow-hidden h-[220px] md:h-full">
            <!-- Background Grid -->
            <div class="absolute inset-0 cyber-grid opacity-60"></div>
            <!-- Ambient Radial Glow -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 rounded-full bg-emerald-neon/10 blur-[80px]"></div>
            
            <!-- Branding Section (Centered) -->
            <div class="relative z-10 flex flex-col items-center">
                <!-- White Logo Card -->
                <div class="bg-white px-5 py-3.5 rounded-xl shadow-[0_10px_25px_rgba(0,0,0,0.2)] border border-white/5 flex items-center justify-center w-48 h-14 mb-5 transition-transform duration-300 hover:scale-[1.02]">
                    <img src="logo.png" alt="Imagyn Technologies" class="max-h-7 object-contain" onerror="this.src='../../logo.png'"/>
                </div>

                <!-- Minimized System Status Pill -->
                <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/[0.03] border border-white/[0.06] backdrop-blur-md text-[10px] font-display font-semibold tracking-wider text-slate-300 shadow-[0_4px_12px_rgba(0,0,0,0.1)]">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-neon animate-pulse"></span>
                    <span>ALL PERIPHERALS OPERATIONAL</span>
                </div>
            </div>
        </div>
        
        <!-- Right Side: Clean Workspace Form -->
        <div class="w-full md:w-[58%] p-8 md:p-10 flex flex-col justify-between bg-white h-auto md:h-full">
            
            <!-- Centered Form Container -->
            <div class="my-auto max-w-sm mx-auto w-full">
                <!-- Heading Group -->
                <div class="mb-6">
                    <h2 class="font-display text-2xl font-extrabold text-slate-900 tracking-tight">Account Login</h2>
                    <p class="text-xs text-slate-400 mt-0.5">Please enter your credentials to access the terminal.</p>
                </div>
                
                <!-- Login Form -->
                <form id="login-form" class="space-y-4">
                    <!-- Account Input -->
                    <div>
                        <label for="account" class="font-display text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 block">Account or Email</label>
                        <div class="relative flex items-center group">
                            <span class="material-symbols-outlined absolute left-3 text-slate-400 group-focus-within:text-slate-600 transition-colors text-[18px]">person</span>
                            <input type="text" id="account" placeholder="Enter account or email" required
                                   class="premium-input pl-10 pr-4 py-2.5 w-full rounded-lg border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-0 transition-all placeholder-slate-400 text-xs text-slate-850 font-medium"/>
                        </div>
                    </div>
                    
                    <!-- Password Input -->
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label for="password" class="font-display text-[10px] font-bold text-slate-500 uppercase tracking-widest block">Password</label>
                        </div>
                        <div class="relative flex items-center group">
                            <span class="material-symbols-outlined absolute left-3 text-slate-400 group-focus-within:text-slate-600 transition-colors text-[18px]">lock</span>
                            <input type="password" id="password" placeholder="••••••••" required
                                   class="premium-input pl-10 pr-10 py-2.5 w-full rounded-lg border border-slate-200 bg-slate-50/50 focus:bg-white focus:ring-0 transition-all placeholder-slate-400 text-xs text-slate-850 font-medium"/>
                            <button type="button" onclick="togglePasswordVisibility()" class="absolute right-3 flex items-center justify-center text-slate-400 hover:text-slate-600 transition-colors">
                                <span class="material-symbols-outlined text-[18px]" id="eye-icon">visibility</span>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Submit Button -->
                    <button type="submit" id="submit-btn" class="w-full bg-brand-dark hover:bg-slate-800 text-white font-bold py-3 rounded-lg shadow-[0_4px_12px_rgba(9,13,26,0.12)] hover:shadow-[0_4px_16px_rgba(9,13,26,0.2)] hover:-translate-y-[0.5px] active:translate-y-0 transition-all duration-150 text-center text-xs tracking-wider uppercase font-display mt-2 flex items-center justify-center">
                        Sign In
                    </button>
                </form>
                
                <!-- Help link -->
                <div class="text-center mt-4">
                    <a href="#" class="text-[11px] text-slate-400 hover:text-slate-600 transition-colors font-medium">Forgot password or account info?</a>
                </div>
            </div>
            
            <!-- Unified Metadata Footer -->
            <div class="mt-6 pt-5 border-t border-slate-100 max-w-sm mx-auto w-full flex flex-col sm:flex-row items-center justify-between text-[9px] text-slate-400 font-medium gap-2">
                <span class="font-display tracking-wider text-slate-500">POS-01 • MAIN BRANCH</span>
                <span class="hidden sm:inline text-slate-200">|</span>
                <span>IMAGYN TECHNOLOGIES POS • V8.4</span>
            </div>
            
        </div>
        
    </div>

    <script>
        // Initialize Terminal Configuration in LocalStorage
        const terminalConfig = {
            terminalId: 'POS-01',
            branch: 'Main Branch',
            version: 'V8.4',
            companyName: 'Imagyn Technologies',
            lastSync: new Date().toISOString()
        };
        localStorage.setItem('terminal_config', JSON.stringify(terminalConfig));

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility';
            }
        }


        // Login Submit Logic with elegant transition & validation feedback
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            const accountInput = document.getElementById('account');
            const passwordInput = document.getElementById('password');
            
            // Disable inputs during processing
            submitBtn.disabled = true;
            accountInput.disabled = true;
            passwordInput.disabled = true;
            
            // Change button state to loading spinner
            submitBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Authenticating...
            `;
            
            // Store Operator details
            const operator = {
                name: accountInput.value,
                role: accountInput.value.toLowerCase().includes('admin') ? 'MANAGER' : 'CASHIER',
                loginTime: new Date().toISOString()
            };
            localStorage.setItem('terminal_operator', JSON.stringify(operator));
            
            // Artificial delay to feel realistic and complete verification
            setTimeout(() => {
                window.location.href = 'shift_open.html';
            }, 1000);
        });
    </script>
</body>
</html>

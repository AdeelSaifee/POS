<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enterprise POS — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* ── Spec primary palette ── */
    --navy-900:#05112A;
    --navy-800:#0F3A7D;
    --navy-700:#1A4A9B;
    --navy-600:#2155B5;
    --blue-600:#2155B5;
    --blue-500:#2D6FE7;
    --blue-100:#DBEAFE;
    --blue-50:#EFF6FF;

    --green-700:#0A7A2B;
    --green-600:#10B341;
    --green-100:#D1FAE5;
    --green-50:#F0FDF4;

    --red-700:#C0392B;
    --red-600:#E74C3C;
    --red-100:#FECACA;
    --red-50:#FEF2F2;

    --amber-700:#C47D0E;
    --amber-600:#F39C12;
    --amber-100:#FEF3C7;
    --amber-50:#FFFBEB;

    /* ── Spec neutral palette ── */
    --ink-900:#2C3E50;
    --ink-800:#34495E;
    --ink-700:#4A5568;
    --ink-600:#606B7B;
    --ink-500:#7F8C8D;
    --ink-400:#95A5A6;
    --ink-300:#BDC3C7;
    --ink-200:#E1E4E8;
    --ink-100:#F0F3F7;

    --line:#E1E4E8;
    --line-soft:rgba(0,0,0,.04);
    --line-hard:rgba(0,0,0,.12);

    --surface:#F8F9FA;
    --surface-2:#F0F3F7;
    --surface-3:#E4E9F2;
    --white:#FFFFFF;

    /* ── Spec tokens ── */
    --radius-sm:6px;
    --radius-md:8px;
    --radius-lg:12px;
    --radius-pill:20px;

    --shadow-sm:0 2px 4px rgba(0,0,0,.05);
    --shadow-1:0 2px 4px rgba(0,0,0,.05);
    --shadow-2:0 4px 12px rgba(0,0,0,.10);
    --shadow-3:0 24px 56px -12px rgba(0,0,0,.22), 0 8px 20px -8px rgba(0,0,0,.10);

    --sans: "Plus Jakarta Sans", ui-sans-serif, -apple-system, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    color: var(--ink-900);
    background: var(--surface);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(15,28,44,.18); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(15,28,44,.32); background-clip: padding-box; border: 2px solid transparent; }

  #app { width: 100vw; height: 100vh; display: flex; flex-direction: column; background: var(--surface); }

  .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }

  /* Sub-pixel hairline */
  .hairline { box-shadow: inset 0 0 0 1px var(--line); }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/ui.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/screens-auth.jsx"></script>
<script type="text/babel" src="src/screens-checkout.jsx"></script>
<script type="text/babel" src="src/screens-cash.jsx"></script>
<script type="text/babel" src="src/screens-reports.jsx"></script>
<script type="text/babel" src="src/screens-admin.jsx"></script>
<script type="text/babel" src="src/screens-extra.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>

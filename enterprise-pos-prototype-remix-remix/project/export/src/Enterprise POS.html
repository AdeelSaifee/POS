<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enterprise POS — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy-900:#081A38;
    --navy-800:#0F2C5C;
    --navy-700:#1A3D7C;
    --navy-600:#23509B;
    --blue-600:#1E5BD6;
    --blue-500:#2D6FE7;
    --blue-100:#DDE7FB;
    --blue-50:#EEF4FF;

    --green-700:#15803D;
    --green-600:#16A34A;
    --green-100:#D1FAE2;
    --green-50:#ECFDF5;

    --red-700:#B91C1C;
    --red-600:#DC2626;
    --red-100:#FEE2E2;
    --red-50:#FEF2F2;

    --amber-700:#B45309;
    --amber-600:#D97706;
    --amber-100:#FEF3C7;
    --amber-50:#FFFBEB;

    --ink-900:#0B1220;
    --ink-800:#111827;
    --ink-700:#1F2937;
    --ink-600:#374151;
    --ink-500:#4B5563;
    --ink-400:#6B7280;
    --ink-300:#9CA3AF;
    --ink-200:#D1D5DB;
    --ink-100:#E5E7EB;

    --line:#E5E7EB;
    --line-soft:#EEF0F4;
    --line-hard:#D1D5DB;

    --surface:#F4F6FA;
    --surface-2:#EDF0F6;
    --surface-3:#E4E9F2;
    --white:#FFFFFF;

    --shadow-1: 0 1px 2px rgba(11,18,32,.06), 0 1px 1px rgba(11,18,32,.04);
    --shadow-2: 0 4px 12px rgba(11,18,32,.08), 0 1px 3px rgba(11,18,32,.04);
    --shadow-3: 0 20px 40px -12px rgba(11,18,32,.25), 0 8px 16px -8px rgba(11,18,32,.12);

    --sans: "IBM Plex Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    color: var(--ink-900);
    background: var(--surface);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(15,28,44,.18); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(15,28,44,.32); background-clip: padding-box; border: 2px solid transparent; }

  #app { width: 100vw; height: 100vh; display: flex; flex-direction: column; background: var(--surface); }

  .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }

  /* Sub-pixel hairline */
  .hairline { box-shadow: inset 0 0 0 1px var(--line); }
</style>

  <meta name="ext-resource-dependency" content="assets/logo.png" data-resource-id="logo">
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
      <rect width="120" height="80" fill="#0A1F44"/>
      <!-- sidebar strip -->
      <rect x="0" y="0" width="28" height="80" fill="#061428"/>
      <!-- logo placeholder -->
      <rect x="4" y="8" width="20" height="6" rx="1" fill="#C9922B" opacity=".9"/>
      <!-- nav items -->
      <rect x="6" y="22" width="14" height="3" rx="1" fill="white" opacity=".3"/>
      <rect x="6" y="30" width="10" height="3" rx="1" fill="white" opacity=".2"/>
      <rect x="6" y="38" width="12" height="3" rx="1" fill="white" opacity=".2"/>
      <rect x="6" y="46" width="9"  height="3" rx="1" fill="white" opacity=".2"/>
      <!-- top status bar -->
      <rect x="28" y="0" width="92" height="12" fill="white" opacity=".95"/>
      <rect x="32" y="3" width="20" height="6" rx="1" fill="#0A1F44" opacity=".15"/>
      <rect x="56" y="4" width="14" height="4" rx="1" fill="#16A34A" opacity=".3"/>
      <!-- hardware strip -->
      <rect x="28" y="12" width="92" height="8" fill="#0A1F44"/>
      <circle cx="34" cy="16" r="2" fill="#4ade80"/>
      <circle cx="44" cy="16" r="2" fill="#4ade80"/>
      <circle cx="54" cy="16" r="2" fill="#4ade80"/>
      <circle cx="64" cy="16" r="2" fill="#4ade80"/>
      <!-- main checkout area -->
      <rect x="28" y="20" width="55" height="60" fill="#F4F6FA"/>
      <!-- item tiles -->
      <rect x="32" y="30" width="18" height="20" rx="2" fill="white"/>
      <rect x="52" y="30" width="18" height="20" rx="2" fill="white"/>
      <rect x="72" y="30" width="8"  height="20" rx="2" fill="white"/>
      <rect x="34" y="52" width="14" height="3" rx="1" fill="#0A1F44" opacity=".2"/>
      <rect x="54" y="52" width="14" height="3" rx="1" fill="#0A1F44" opacity=".2"/>
      <!-- cart panel -->
      <rect x="83" y="20" width="37" height="60" fill="white"/>
      <rect x="86" y="24" width="28" height="3" rx="1" fill="#0A1F44" opacity=".15"/>
      <rect x="86" y="30" width="28" height="8" rx="1" fill="#F4F6FA"/>
      <rect x="86" y="40" width="28" height="8" rx="1" fill="#F4F6FA"/>
      <rect x="86" y="50" width="28" height="8" rx="1" fill="#F4F6FA"/>
      <!-- pay button -->
      <rect x="86" y="68" width="28" height="8" rx="2" fill="#16A34A"/>
      <rect x="92" y="70" width="16" height="4" rx="1" fill="white" opacity=".8"/>
    </svg>
  </template>

</head>

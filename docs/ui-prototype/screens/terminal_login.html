<!DOCTYPE html>

                        "on-secondary-container": "#00714d",

                        "secondary-fixed": "#6ffbbe",

                        "outline": "#76777d",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "secondary-container": "#6cf8bb",
                        "surface-main": "#FFFFFF",
                        "on-primary-fixed-variant": "#3f465c",
                        "on-primary": "#ffffff",
                        "surface-variant": "#d8e3fb",
                        "on-background": "#111c2d",
                        "on-secondary-fixed-variant": "#005236",
                        "tertiary-container": "#2a1700",
                        "surface-bright": "#f9f9ff",

                        "error-container": "#ffdad6",

                        "primary-fixed-dim": "#bec6e0",

                        "on-tertiary-container": "#b87500",
                        "secondary": "#10B981", /* Overriding to Emerald Green per instruction */
                        "surface-container": "#e7eeff",
                        "inverse-surface": "#263143",

                        "danger": "#EF4444",
                        "inverse-on-surface": "#ecf1ff",

                        "on-primary-fixed": "#131b2e",

                        "background": "#0F172A", /* Overriding to Deep Slate Navy per instruction */

                    },
                    "borderRadius": {

                        "lg": "8px", /* Specific 8px per instruction */
                        "xl": "0.75rem",
                        "full": "9999px"

                        "gutter": "16px",

                    "fontFamily": {

        }

<style>
        body {
            background-color: #0F172A;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pin-block {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .keypad-btn {
            transition: transform 0.1s ease, background-color 0.1s ease;
        }
        .keypad-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
<div class="w-full max-w-md px-6">
<!-- Main Login Card -->
<div class="bg-surface-main rounded-lg shadow-xl overflow-hidden animate-in fade-in zoom-in duration-500">
<!-- Card Header -->
<header class="bg-surface-secondary px-8 py-6 flex flex-col gap-1 border-b border-border-subtle">
<div class="flex justify-between items-center">
<span class="font-headline-lg text-headline-lg text-primary tracking-tight">Imtiaz</span>
<span class="font-label-sm text-label-sm px-2 py-1 bg-primary-container text-on-primary rounded">POS-01</span>
</div>
<div class="flex items-center gap-2 text-text-secondary">
<span class="material-symbols-outlined text-[18px]">location_on</span>
<span class="font-label-md text-label-md">Tariq Road</span>
</div>
</header>
<!-- Card Content -->
<div class="px-8 py-8">
<div class="text-center mb-8">
<h1 class="font-headline-md text-headline-md text-on-background mb-6">Enter Employee PIN</h1>
<!-- PIN Display -->
<div class="flex justify-center gap-4 mb-8" id="pin-display">
<!-- Filled -->
<div class="pin-block w-12 h-16 rounded-lg border-2 border-primary-container bg-primary-container flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-white"></div>
</div>
<!-- Filled -->
<div class="pin-block w-12 h-16 rounded-lg border-2 border-primary-container bg-primary-container flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-white"></div>
</div>
<!-- Empty -->
<div class="pin-block w-12 h-16 rounded-lg border-2 border-border-input bg-surface-secondary flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-transparent"></div>
</div>
<!-- Empty -->
<div class="pin-block w-12 h-16 rounded-lg border-2 border-border-input bg-surface-secondary flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-transparent"></div>
</div>
</div>
</div>
<!-- Numerical Keypad -->
<div class="grid grid-cols-3 gap-3 mb-8">
<!-- Row 1 -->
<button class="keypad-btn h-16 rounded-lg bg-surface-secondary hover:bg-surface-container border border-border-subtle font-headline-md text-headline-md flex items-center justify-center">1</button>
<button class="keypad-btn h-16 rounded-lg bg-surface-secondary hover:bg-surface-container border border-border-subtle font-headline-md text-headline-md flex items-center justify-center">2</button>
<button class="keypad-btn h-16 rounded-lg bg-surface-secondary hover:bg-surface-container border border-border-subtle font-headline-md text-headline-md flex items-center justify-center">3</button>
<!-- Row 2 -->
<button class="keypad-btn h-16 rounded-lg bg-surface-secondary hover:bg-surface-container border border-border-subtle font-headline-md text-headline-md flex items-center justify-center">4</button>
<button class="keypad-btn h-16 rounded-lg bg-surface-secondary hover:bg-surface-container border border-border-subtle font-headline-md text-headline-md flex items-center justify-center">5</button>
<button class="keypad-btn h-16 rounded-lg bg-surface-secondary hover:bg-surface-container border border-border-subtle font-headline-md text-headline-md flex items-center justify-center">6</button>
<!-- Row 3 -->
<button class="keypad-btn h-16 rounded-lg bg-surface-secondary hover:bg-surface-container border border-border-subtle font-headline-md text-headline-md flex items-center justify-center">7</button>
<button class="keypad-btn h-16 rounded-lg bg-surface-secondary hover:bg-surface-container border border-border-subtle font-headline-md text-headline-md flex items-center justify-center">8</button>
<button class="keypad-btn h-16 rounded-lg bg-surface-secondary hover:bg-surface-container border border-border-subtle font-headline-md text-headline-md flex items-center justify-center">9</button>
<!-- Bottom Row -->
<button class="keypad-btn h-16 rounded-lg bg-surface-container/50 hover:bg-surface-container border border-border-subtle font-label-md text-label-md text-text-secondary flex items-center justify-center">CLR</button>
<button class="keypad-btn h-16 rounded-lg bg-surface-secondary hover:bg-surface-container border border-border-subtle font-headline-md text-headline-md flex items-center justify-center">0</button>
<button class="keypad-btn h-16 rounded-lg bg-surface-container/50 hover:bg-surface-container border border-border-subtle flex items-center justify-center">
<span class="material-symbols-outlined text-text-secondary" data-icon="backspace">backspace</span>
</button>
</div>
<!-- Primary Action -->
<button class="w-full h-14 rounded-lg bg-secondary text-white font-headline-md text-headline-md shadow-lg shadow-secondary/20 hover:brightness-110 active:brightness-95 transition-all flex items-center justify-center gap-2">
                    Verify &amp; Log In
                </button>
</div>
<!-- Card Footer -->
<footer class="px-8 py-6 bg-surface-secondary border-t border-border-subtle">
<div class="flex flex-col gap-3">
<button class="flex items-center justify-center gap-2 text-on-primary-container hover:text-primary transition-colors py-2">
<span class="material-symbols-outlined text-[20px]" data-icon="settings">settings</span>
<span class="font-label-md text-label-md">Change Location / Terminal</span>
</button>
<button class="flex items-center justify-center gap-2 text-on-primary-container hover:text-danger transition-colors py-2">
<span class="material-symbols-outlined text-[20px]" data-icon="support_agent">support_agent</span>
<span class="font-label-md text-label-md">Request Manager Help</span>
</button>
</div>
</footer>
</div>
<!-- Atmospheric Footer Info (Optional for UI fidelity) -->
<div class="mt-8 text-center">
<p class="text-on-primary-container font-label-sm text-label-sm opacity-60">System Version 4.8.2-Stable • Connected to Retail-Cloud-09</p>
</div>
</div>
<script>
        // Micro-interactions for the PIN display and keypad
        let currentPin = "12"; // Starting state as per prompt (2 filled, 2 empty)
        const pinDisplay = document.getElementById('pin-display');
        const keypadButtons = document.querySelectorAll('.keypad-btn');

        function updateDisplay() {
            const blocks = pinDisplay.querySelectorAll('.pin-block');
            blocks.forEach((block, index) => {
                const dot = block.querySelector('div');
                if (index < currentPin.length) {
                    block.classList.remove('border-border-input', 'bg-surface-secondary');
                    block.classList.add('border-primary-container', 'bg-primary-container');
                    dot.classList.remove('bg-transparent');
                    dot.classList.add('bg-white');
                } else {
                    block.classList.add('border-border-input', 'bg-surface-secondary');
                    block.classList.remove('border-primary-container', 'bg-primary-container');
                    dot.classList.add('bg-transparent');
                    dot.classList.remove('bg-white');
                }
            });
        }

        keypadButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const val = btn.innerText.trim();
                
                if (val === 'CLR') {
                    currentPin = "";
                } else if (btn.querySelector('[data-icon="backspace"]')) {
                    currentPin = currentPin.slice(0, -1);
                } else if (currentPin.length < 4 && !isNaN(val)) {
                    currentPin += val;
                }
                
                updateDisplay();
                
                // Haptic-like visual feedback
                btn.style.transform = 'scale(0.92)';
                setTimeout(() => btn.style.transform = '', 100);
            });
        });

        // Add visual entry animation for the card
        document.addEventListener('DOMContentLoaded', () => {
            updateDisplay();
        });
    </script>
</body></html>
